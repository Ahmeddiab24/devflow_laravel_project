; DevFlow PHP-FPM Pool Configuration
; DevOps practice: tune these values based on Grafana metrics

[www]
user = www
group = www
listen = 0.0.0.0:9000
listen.owner = www
listen.group = www

; ── PROCESS MANAGER ──────────────────────────────────────────────────────────
; dynamic: start pm.start_servers, scale between min/max based on load
pm = dynamic
pm.max_children = 20        ; max concurrent PHP processes
pm.start_servers = 4        ; processes at startup
pm.min_spare_servers = 2    ; min idle processes
pm.max_spare_servers = 8    ; max idle processes
pm.max_requests = 500       ; restart worker after N requests (prevents memory leaks)

; ── STATUS PAGE (for Prometheus scraping) ────────────────────────────────────
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; ── SLOW LOG ─────────────────────────────────────────────────────────────────
slowlog = /var/log/php-fpm/slow.log
request_slowlog_timeout = 5s    ; log requests taking >5s

; ── LIMITS ───────────────────────────────────────────────────────────────────
request_terminate_timeout = 300
