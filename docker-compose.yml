services:
  app:
    build: .
    container_name: devflow_app
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis 
    
  nginx:
    image: nginx:alpine
    container_name: devflow_nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - .:/var/www/html
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: devflow_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: devflow_redis
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: devflow_worker
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis 
    command: php artisan queue:work --verbose --tries=3 --timeout=90

volumes:
  db_data:    
