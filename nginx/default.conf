##############################################################################
#  DevFlow — Nginx Virtual Host Config
##############################################################################

server {
    listen 80;
    server_name localhost devflow.local;

    # Redirect all HTTP to HTTPS in production
    # Uncomment when you have SSL certs set up:
    # return 301 https://$host$request_uri;

    root /var/www/html/public;
    index index.php;
    charset utf-8;

    # ── STATUS ENDPOINT (for Prometheus nginx-exporter) ───────────────────
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 172.0.0.0/8;   # Allow from Docker network only
        deny all;
    }

    # ── HEALTH CHECK ──────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── STATIC ASSETS (cache aggressively) ───────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── API RATE LIMITING ────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_conn conn_limit 10;

        try_files $uri $uri/ /index.php?$query_string;

        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # ── LOGIN RATE LIMITING ───────────────────────────────────────────────
    location /login {
        limit_req zone=login burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ── MAIN LARAVEL ROUTING ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM HANDLER ───────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_index index.php;
        fastcgi_read_timeout 300;

        # Fastcgi cache (optional — good for DevOps to learn cache invalidation)
        # fastcgi_cache devflow_cache;
        # fastcgi_cache_valid 200 1m;
        # fastcgi_cache_methods GET HEAD;
    }

    # ── DENY SENSITIVE FILES ──────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
    location ~ /\.(?!well-known).* {
        deny all;
    }
    location ~ /\.(env|log|git|svn)/ {
        deny all;
        return 404;
    }
}

