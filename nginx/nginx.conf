##############################################################################
#  DevFlow — Nginx Configuration
#  This config is production-hardened. Study the comments for DevOps practice.
##############################################################################

user nginx;
worker_processes auto;          # auto = 1 worker per CPU core
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ── EVENT TUNING ──────────────────────────────────────────────────────────────
events {
    worker_connections 1024;    # max simultaneous connections per worker
    use epoll;                  # efficient I/O event notification (Linux)
    multi_accept on;            # accept as many connections as possible at once
}

# ── HTTP BLOCK ────────────────────────────────────────────────────────────────
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── LOGGING FORMAT ──────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # JSON log format (useful for log aggregation with ELK/Loki)
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── PERFORMANCE ─────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # ── GZIP COMPRESSION ────────────────────────────────────────────────────
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/x-component;

    # ── RATE LIMITING ────────────────────────────────────────────────────────
    # Define zones for rate limiting (DevOps practice: protect APIs)
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── SECURITY HEADERS ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide nginx version
    server_tokens off;

    # ── UPSTREAM — PHP-FPM ──────────────────────────────────────────────────
    upstream php-fpm {
        server app:9000;
        # Uncomment for load balancing practice with multiple app instances:
        # server app_2:9000 weight=2;
        # server app_3:9000 backup;
        keepalive 32;
    }

    # ── INCLUDE VIRTUAL HOSTS ───────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
